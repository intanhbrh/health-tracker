<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalVibe KL | Ultra Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="profile-section">
                <div class="avatar">IA</div>
                <div>
                    <p class="greeting">Morning, Intan! 👋</p>
                    <p class="location"><i data-lucide="map-pin"></i> Kuala Lumpur, MY</p>
                </div>
            </div>
            <div class="weather-pill">
                <i data-lucide="cloud-rain"></i> 28°C
            </div>
        </header>

        <section class="goal-card">
            <div class="goal-header">
                <h3>Weekly Goal</h3>
                <span>75%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 75%;"></div>
            </div>
            <p class="goal-desc">Only <strong>5.6km</strong> left to smash your goal!</p>
        </section>

        <div class="stats-grid">
            <div class="mini-card highlight" onclick="toggleRun()">
                <i data-lucide="play-circle"></i>
                <span>Start Run</span>
            </div>
            <div class="mini-card">
                <i data-lucide="timer"></i>
                <span class="val">42m</span>
                <span class="lab">Avg Pace</span>
            </div>
            <div class="mini-card">
                <i data-lucide="users"></i>
                <span class="val">#12</span>
                <span class="lab">KL Rank</span>
            </div>
        </div>

        <section class="hotspots">
            <div class="section-title">
                <h3>Weekend Hotspots</h3>
                <a href="#">View All</a>
            </div>
            
            <div class="scroll-row">
                <div class="spot-card car-free">
                    <span class="badge">Sunday</span>
                    <h4>KL Car Free Morning</h4>
                    <p>Dataran DBKL • 7:00 AM</p>
                    <button class="action-btn" onclick="joinEvent(this)">Join 2.4k others</button>
                </div>

                <div class="spot-card saujana">
                    <span class="badge">Saturday</span>
                    <h4>Saujana Hijau</h4>
                    <p>Putrajaya • 6:30 AM</p>
                    <button class="action-btn" onclick="joinEvent(this)">Join 800 others</button>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <div class="nav-item active"><i data-lucide="home"></i></div>
            <div class="nav-item"><i data-lucide="map"></i></div>
            <div class="nav-item add-btn"><i data-lucide="plus"></i></div>
            <div class="nav-item"><i data-lucide="trophy"></i></div>
            <div class="nav-item"><i data-lucide="settings"></i></div>
        </nav>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
